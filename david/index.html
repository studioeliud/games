<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>David the Shepherd 3D</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:#0a1410;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #frame{position:relative;box-shadow:0 16px 60px rgba(0,0,0,.7);border-radius:8px;overflow:hidden;}
  #game{display:block;touch-action:none;}
  .overlay{position:absolute;inset:0;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;pointer-events:none;}
  .overlay.show{pointer-events:auto;}
  .hidden{display:none!important;}
  #hud{position:absolute;inset:0;pointer-events:none;font-weight:700;}
  /* top full-width progress strip */
  #progTop{position:absolute;top:0;left:0;right:0;height:8px;background:rgba(0,0,0,.35);}
  #progTop>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffe06a,#ffb347);box-shadow:0 0 8px rgba(255,200,80,.6);}
  #progBear{position:absolute;top:-6px;font-size:14px;transform:translateX(-50%);transition:left .1s linear;}
  .card{position:absolute;background:rgba(18,28,20,.46);border:1px solid rgba(255,255,255,.16);border-radius:14px;
    padding:8px 12px;box-shadow:0 4px 14px rgba(0,0,0,.3);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
  #leftCard{top:16px;left:10px;}
  #rightCard{top:16px;right:10px;text-align:right;min-width:78px;}
  .hearts{font-size:19px;letter-spacing:3px;line-height:1;}
  .heartOn{color:#ff4d63;text-shadow:0 0 6px rgba(255,80,100,.6);}
  .heartOff{color:rgba(255,255,255,.22);}
  .sheepLine{margin-top:6px;font-size:14px;color:#eafce0;}
  .sheepLine b{color:#fff;font-size:16px;}
  .scoreBig{font-size:24px;font-weight:800;color:#fff;line-height:1;text-shadow:0 2px 4px rgba(0,0,0,.5);}
  .wolfLine{margin-top:4px;font-size:13px;color:#ffd0a0;}
  #chips{position:absolute;left:10px;bottom:14px;display:flex;gap:7px;flex-wrap:wrap;max-width:70%;}
  .chip{background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:4px 10px;font-size:13px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6);}
  .chip.sling{color:#cfe9ff;} .chip.stones{color:#f0e6c2;} .chip.shield{color:#9cdcff;border-color:rgba(120,200,255,.4);}
  #comboBadge{position:absolute;bottom:18px;right:12px;background:linear-gradient(#ffcf3a,#ff9a2e);
    color:#5a2e00;font-weight:900;font-size:15px;padding:5px 15px;border-radius:999px;box-shadow:0 3px 10px rgba(0,0,0,.4);white-space:nowrap;}
  #bossCard{position:absolute;top:80px;left:10px;right:10px;background:rgba(30,12,10,.5);border:1px solid rgba(255,120,90,.35);
    border-radius:12px;padding:6px 10px;display:none;box-shadow:0 4px 14px rgba(0,0,0,.4);}
  #bossLabel{font-size:12px;color:#ffd9cf;text-align:center;margin-bottom:4px;letter-spacing:1px;}
  .bar{height:16px;background:rgba(0,0,0,.45);border-radius:8px;overflow:hidden;}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(#ff7a5a,#d8331c);transition:width .12s;}
  #mute{position:absolute;top:14px;right:96px;font-size:18px;pointer-events:auto;cursor:pointer;opacity:.85;}
  h1{font-size:40px;line-height:1.05;text-shadow:0 3px 10px rgba(0,0,0,.6);}
  .sub{margin-top:10px;font-size:15px;color:#e6e6e6;}
  .stars{font-size:38px;letter-spacing:6px;margin:10px 0;}
  .stat{font-size:15px;margin:2px 0;}
  .sec{font-weight:800;margin-top:12px;}
  #title h1 .accent{color:#ffe06a;}
  button.play{pointer-events:auto;padding:14px 40px;font-size:20px;font-weight:800;border:0;border-radius:14px;letter-spacing:1px;
    background:linear-gradient(#ffffff,#dfe6f0);color:#1f2a44;cursor:pointer;box-shadow:0 5px 16px rgba(0,0,0,.4);transition:transform .07s,box-shadow .07s;}
  button.play:hover{box-shadow:0 7px 22px rgba(0,0,0,.45);}
  button.play:active{transform:translateY(2px);box-shadow:0 3px 10px rgba(0,0,0,.4);}
  #startBtn{margin-top:22px;}
  .hint{margin-top:16px;font-size:13px;color:#cfcfcf;}
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.5);pointer-events:none;}
  /* result card: scrollable stats with a pinned button that is always visible */
  #resultScreen .scrim{background:rgba(0,0,0,.66);}
  #resultCard{position:relative;display:flex;flex-direction:column;align-items:center;width:88%;max-width:360px;max-height:86%;
    background:linear-gradient(180deg,rgba(28,38,30,.96),rgba(18,26,20,.96));border:1px solid rgba(255,255,255,.14);
    border-radius:20px;padding:22px 22px 20px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #resultBody{width:100%;overflow-y:auto;text-align:center;padding-bottom:6px;}
  #againBtn{margin-top:16px;flex:0 0 auto;}
  #resultScreen.win h1{color:#9be38a;} #resultScreen.lose h1{color:#ff8a8a;}
  .reason{font-size:15px;color:#ffd0d0;margin-top:6px;}
  .rewards{font-size:14px;margin-top:2px;}
  .ach{font-size:14px;color:#bfe4ff;margin-top:2px;}
  .panelbox{position:relative;max-width:380px;width:100%;}
  /* palette (tone) swatches */
  .swatchRow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;pointer-events:auto;}
  .swLabel{font-size:12px;color:#cfcfcf;letter-spacing:.08em;margin-top:14px;opacity:.85;}
  .sw{position:relative;width:62px;height:42px;border-radius:10px;border:2px solid rgba(255,255,255,.25);cursor:pointer;
    overflow:hidden;padding:0;box-shadow:0 3px 9px rgba(0,0,0,.4);transition:transform .1s,border-color .1s;}
  .sw>span{position:absolute;left:0;right:0;bottom:0;font-size:10px;font-weight:800;color:#fff;
    background:rgba(0,0,0,.42);padding:2px 0;text-shadow:0 1px 2px rgba(0,0,0,.8);}
  .sw:hover{transform:translateY(-2px);}
  .sw.on{border-color:#ffe06a;box-shadow:0 0 0 2px rgba(255,224,106,.5),0 3px 9px rgba(0,0,0,.4);}
  /* pause */
  #pauseBtn{position:absolute;top:14px;right:60px;font-size:18px;pointer-events:auto;cursor:pointer;opacity:.85;}
  #pauseScreen .scrim{background:rgba(0,0,0,.6);}
  #pauseCard{position:relative;display:flex;flex-direction:column;align-items:center;width:86%;max-width:340px;
    background:linear-gradient(180deg,rgba(28,38,30,.96),rgba(18,26,20,.96));border:1px solid rgba(255,255,255,.14);
    border-radius:20px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #pauseCard h2{font-size:24px;color:#fff;margin-bottom:4px;}
  .fxToggle{margin-top:16px;pointer-events:auto;cursor:pointer;border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.08);color:#eafce0;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:700;}
  .fxToggle:hover{background:rgba(255,255,255,.16);}
  /* stage select list */
  .stageList{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;margin:6px auto 0;pointer-events:auto;}
  .stageBtn{display:flex;align-items:center;gap:11px;width:100%;cursor:pointer;text-align:left;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:11px 14px;
    color:#fff;font-weight:700;font-size:15px;transition:transform .1s,background .12s,border-color .12s;}
  .stageBtn:hover{transform:translateY(-2px);background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.32);}
  .stageBtn .biome{width:16px;height:16px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,.25);}
  .stageBtn .nm{flex:1 1 auto;}
  .stageBtn .tag{font-size:11px;font-weight:800;letter-spacing:.06em;color:#ffe06a;opacity:.95;}
  .stageBtn.locked{opacity:.45;cursor:not-allowed;}
  .stageBtn.locked:hover{transform:none;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);}
  /* achievements screen */
  #achCard{position:relative;display:flex;flex-direction:column;align-items:center;width:88%;max-width:360px;max-height:84%;
    background:linear-gradient(180deg,rgba(28,38,30,.97),rgba(18,26,20,.97));border:1px solid rgba(255,255,255,.14);
    border-radius:20px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #achCard h2{font-size:22px;color:#fff;margin-bottom:12px;}
  .achList{width:100%;overflow-y:auto;display:flex;flex-direction:column;gap:7px;}
  .achRow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);color:#9aa7a0;font-size:14px;font-weight:700;}
  .achRow.got{background:rgba(120,200,120,.12);border-color:rgba(150,220,150,.35);color:#eafce0;}
  .achRow .aic{font-size:15px;flex:0 0 auto;}
  .achRow .alb{flex:1 1 auto;text-align:left;}
  .achRow .apg{font-size:12px;color:#ffe06a;font-weight:800;}
  #walletLine{font-size:15px;color:#ffe7a0;margin-top:14px;letter-spacing:.02em;}
  .btnRow{display:flex;gap:8px;justify-content:center;margin-top:8px;}
  /* shop screen */
  #shopCard{position:relative;display:flex;flex-direction:column;align-items:center;width:90%;max-width:380px;max-height:86%;
    background:linear-gradient(180deg,rgba(28,38,30,.97),rgba(18,26,20,.97));border:1px solid rgba(255,255,255,.14);
    border-radius:20px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #shopCard h2{font-size:22px;color:#fff;}
  .walletHdr{font-size:15px;color:#ffe7a0;margin:6px 0 12px;}
  .shopBody{width:100%;overflow-y:auto;display:flex;flex-direction:column;gap:7px;}
  .shopSec{font-size:13px;font-weight:800;color:#a0d8ff;letter-spacing:.04em;margin:8px 2px 2px;text-align:left;}
  .shopSec .dim{font-weight:600;color:#7f8a86;font-size:11px;}
  .shopRow{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);}
  .shopRow .dot{width:16px;height:16px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,.2);}
  .shopRow .info{flex:1 1 auto;text-align:left;display:flex;flex-direction:column;}
  .shopRow .info b{color:#fff;font-size:14px;}
  .shopRow .info span{color:#9aa7a0;font-size:11.5px;font-weight:600;}
  .shopRow .buy{cursor:pointer;border:1px solid rgba(255,224,106,.5);background:rgba(255,224,106,.12);color:#ffe06a;
    border-radius:9px;padding:7px 11px;font-size:12.5px;font-weight:800;white-space:nowrap;flex:0 0 auto;}
  .shopRow .buy.no{opacity:.4;border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#9aa7a0;}
  .shopRow .tagx.on{font-size:12px;font-weight:800;color:#9be38a;white-space:nowrap;}
</style>
</head>
<body>
<div id="wrap"><div id="frame">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div id="progTop"><i id="progFill"></i><span id="progBear">▲</span></div>
    <div id="mute">🔊</div>
    <div id="pauseBtn">⏸</div>
    <div class="card" id="leftCard">
      <div class="hearts" id="hHp"></div>
      <div class="sheepLine">양 <b id="hSheep">8</b><span id="hSheepMax" style="opacity:.7"> / 8</span></div>
    </div>
    <div class="card" id="rightCard">
      <div class="scoreBig" id="hScore">0</div>
      <div class="wolfLine">늑대 <span id="hWolves">0</span></div>
    </div>
    <div id="chips">
      <span class="chip sling" id="hSling">슬링 1발·10</span>
      <span class="chip stones" id="hStones">돌 10</span>
      <span class="chip shield" id="hShield" style="display:none">보호막 0</span>
    </div>
    <div id="comboBadge" class="hidden"></div>
    <div id="bossCard">
      <div id="bossLabel">BEAR</div>
      <div class="bar" id="bossBar"><i></i></div>
    </div>
  </div>

  <div id="startScreen" class="overlay show">
    <div class="scrim"></div>
    <div id="title" class="panelbox">
      <h1>다윗<br><span class="accent">양치기 소년</span></h1>
      <div class="sub" id="subtitle">양 떼를 지키고 곰을 물리치세요 — 3D</div>
      <div class="swLabel">스테이지 선택</div>
      <div id="stageSelect" class="stageList"></div>
      <div class="swLabel">화면 톤</div>
      <div class="swatchRow" id="titleSwatches"></div>
      <div class="hint">드래그 · A/D · ← →  로 이동 · P 일시정지</div>
      <div class="hint" id="walletLine"></div>
      <div class="btnRow"><button id="shopBtn" class="fxToggle">🛖 상점</button><button id="achBtn" class="fxToggle">🏅 업적</button></div>
      <div class="hint" id="bestLine"></div>
    </div>
  </div>

  <div id="achScreen" class="overlay hidden">
    <div class="scrim"></div>
    <div id="achCard" class="panelbox">
      <h2 id="achHdr">업적</h2>
      <div id="achList" class="achList"></div>
      <button class="play" id="achClose" style="margin-top:14px">닫기</button>
    </div>
  </div>

  <div id="shopScreen" class="overlay hidden">
    <div class="scrim"></div>
    <div id="shopCard" class="panelbox">
      <h2>🛖 상점</h2>
      <div id="shopWallet" class="walletHdr"></div>
      <div id="shopList" class="shopBody"></div>
      <button class="play" id="shopClose" style="margin-top:12px">닫기</button>
    </div>
  </div>

  <div id="pauseScreen" class="overlay hidden">
    <div class="scrim"></div>
    <div id="pauseCard" class="panelbox">
      <h2>일시정지</h2>
      <div class="swLabel">화면 톤</div>
      <div class="swatchRow" id="pauseSwatches"></div>
      <button id="fxBtn" class="fxToggle">✨ 이펙트: 가득</button>
      <button class="play" id="resumeBtn" style="margin-top:16px">계속하기</button>
    </div>
  </div>

  <div id="resultScreen" class="overlay hidden">
    <div class="scrim"></div>
    <div id="resultCard">
      <div id="resultBody"></div>
      <button class="play" id="againBtn">다시 하기</button>
      <button id="menuBtn" class="fxToggle" style="margin-top:10px">← 스테이지 선택</button>
    </div>
  </div>
</div></div>

<script>
"use strict";
/* ====================================================================
   David the Shepherd — 3D (dependency-free projected renderer)
   Single file. Open directly (file://) or in a canvas/artifact preview.
   ==================================================================== */

// ----------------------------- DATA ---------------------------------
const DATA = {
  level: { name:"양치기들의 들판", length:13000, runSpeed:170, speedRamp:0.9, initialSheep:8,
    stats:{hp:5,maxHp:5,slingProjectiles:1,slingDamage:10,slingCooldown:0.5,staffDamage:10,staffRange:58,staffCooldown:0.45,stones:10,stoneRegen:1.1,stoneMax:40},
    boss:{y:13000} },
  // Base damage is 10; enemy HP/threat scaled to match so growth stays bounded.
  wolf:{hp:30,damage:1,radius:13,contact:30}, bear:{hp:1050,radius:44,moveSpeed:92,approach:62,charge:380,chargeCD:1.35,windup:0.45,contact:60,dmg:2,sheepHit:2,armor:0.42},
  rewards:{base:{coins:50,chapter_points:1,unlock_tokens:0},perStar:{coins:25,chapter_points:1},three:{coins:50,unlock_tokens:1},perWolf:{coins:3},perSheep:{coins:2}},
  rewardLabel:{coins:'코인',chapter_points:'챕터 포인트',unlock_tokens:'해금 토큰'},
  // c:(runStats, save)->bool. Optional prog:(save)->"x / y" for the screen.
  achievements:[ {id:'save_10_sheep',label:'양 10마리 지키기',c:s=>s.sheepSaved>=10},{id:'defeat_30_wolves',label:'한 판에 늑대 30마리 처치',c:s=>s.wolves>=30},
    {id:'clear_without_losing_sheep',label:'양 한 마리도 잃지 않고 클리어',c:s=>s.win&&s.sheepLost<=0},{id:'defeat_bear_boss',label:'곰 보스 처치',c:s=>s.win},
    {id:'collect_100_stones',label:'한 판에 돌 100개 모으기',c:s=>s.stones>=100},
    {id:'flawless',label:'무피해 클리어',c:s=>s.win&&s.hp>=s.maxHp},
    {id:'clear_all_stages',label:'모든 스테이지 클리어',c:(s,sv)=>STAGES.every(st=>sv.stagesCleared.includes(st.id)),prog:sv=>sv.stagesCleared.filter(id=>STAGES.some(s=>s.id===id)).length+' / '+STAGES.length},
    {id:'rich_1000',label:'코인 1000 모으기 (누적)',c:(s,sv)=>sv.totals.coinsEarned>=1000,prog:sv=>Math.min(sv.totals.coinsEarned,1000)+' / 1000'},
    {id:'wolfbane_100',label:'늑대 100마리 처치 (누적)',c:(s,sv)=>sv.totals.wolves>=100,prog:sv=>Math.min(sv.totals.wolves,100)+' / 100'},
    {id:'veteran_10',label:'10회 승리 (누적)',c:(s,sv)=>sv.totals.wins>=10,prog:sv=>Math.min(sv.totals.wins,10)+' / 10'} ],
  stars:{three:{sheep:0.8,hp:0.5},two:{sheep:0.5,hp:0},one:{sheep:0,hp:0}},
};

// --------------------------- STAGES ----------------------------------
// Shared starting kit — every stage begins with the SAME build so that the
// player's gate choices (not the stage) decide the boss fight (principle 3).
const BASE_STATS = {hp:5,maxHp:5,slingProjectiles:1,slingDamage:10,slingCooldown:0.5,staffDamage:10,staffRange:58,staffCooldown:0.45,stones:10,stoneRegen:1.1,stoneMax:40};
const BASE_STARS = {three:{sheep:0.8,hp:0.5},two:{sheep:0.5,hp:0},one:{sheep:0,hp:0}};
// Bear template; each stage's boss is a stat/reskin variant of this.
const BEAR_BASE = {radius:44,moveSpeed:92,approach:62,charge:380,chargeCD:1.35,windup:0.45,contact:60,dmg:2,sheepHit:2,armor:0.42};
const bear=(o)=>Object.assign({},BEAR_BASE,o);
// REVIEW MODE: every stage is freely selectable while tuning. The sequential
// unlock model below is fully implemented (stagesCleared gating); flip this to
// false later and locks engage with zero rework.
const REVIEW_UNLOCK_ALL = true;
// A stage = one biome (palette) + balance. Add a stage = add one entry here.
const STAGES = [
  { id:'fields', name:'양치기들의 들판', palette:'midday', length:11000, runSpeed:165, speedRamp:0.8, initialSheep:8,
    spawn:{gapMin:360,gapMax:620,packChance:0.28,hpBase:12,hpRamp:120,eliteAfterY:2000,eliteRate:0.10,stoneGapMin:280,stoneGapMax:460},
    boss:bear({hp:900,label:'곰'}), stars:BASE_STARS, rewardMult:1.0 },
  { id:'barley', name:'황금빛 보리밭', palette:'golden_hour', length:13000, runSpeed:175, speedRamp:0.9, initialSheep:8,
    spawn:{gapMin:330,gapMax:560,packChance:0.34,hpBase:16,hpRamp:150,eliteAfterY:1600,eliteRate:0.15,stoneGapMin:270,stoneGapMax:450},
    boss:bear({hp:1100,label:'성난 곰'}), stars:BASE_STARS, rewardMult:1.2 },
  { id:'moor', name:'폭풍 전의 황야', palette:'overcast', length:14500, runSpeed:185, speedRamp:1.0, initialSheep:7,
    spawn:{gapMin:300,gapMax:520,packChance:0.40,hpBase:20,hpRamp:180,eliteAfterY:1400,eliteRate:0.20,stoneGapMin:260,stoneGapMax:440},
    boss:bear({hp:1300,chargeCD:1.2,label:'잿빛 곰',col:{base:'#5a5550',lite:'#9a948c'}}), stars:BASE_STARS, rewardMult:1.45 },
  { id:'vale', name:'달빛 골짜기', palette:'dusk', length:16000, runSpeed:195, speedRamp:1.1, initialSheep:7,
    spawn:{gapMin:280,gapMax:480,packChance:0.45,hpBase:24,hpRamp:210,eliteAfterY:1100,eliteRate:0.26,stoneGapMin:250,stoneGapMax:430},
    boss:bear({hp:1500,chargeCD:1.1,moveSpeed:104,label:'그림자 곰',col:{base:'#2e2a40',lite:'#6a6488'}}), stars:BASE_STARS, rewardMult:1.7 },
];

// --------------------------- META / SHOP -----------------------------
// Growth = variety + sidegrades, never raw power that skips the boss skill
// check (principle 3). Shepherd traits are TRADE-OFFs (+X for -Y); locked
// gates add draft options; coins buy cosmetics / a per-run consumable.
const SHEPHERDS = [

  _def(){return {v:1, wallet:{coins:0,chapter_points:0,unlock_tokens:0}, achievementsUnlocked:[], stagesCleared:[],

    totals:{coinsEarned:0,cpEarned:0,tokensEarned:0,wolves:0,sheepSaved:0,runs:0,wins:0}};},
  _merge(def,d){const o=Object.assign({},def,d);

    o.totals=Object.assign({},def.totals,d.totals||{});o.owned=Object.assign({},def.owned,d.owned||{});
    o.equipped=Object.assign({},def.equipped,d.equipped||{});o.bestPerStage=Object.assign({},d.bestPerStage||{});

  tone(f,d,t,v,s){if(!this.ctx||this.muted)return;const n=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t||'square';o.frequency.setValueAtTime(f,n);if(s)o.frequency.exponentialRampToValueAtTime(Math.max(40,s),n+d);g.gain.setValueAtTime(.0001,n);g.gain.exponentialRampToValueAtTime(v||.5,n+.01);g.gain.exponentialRampToValueAtTime(.0001,n+d);o.connect(g);g.connect(this.master);o.start(n);o.stop(n+d+.02);},

// --------------------------- PARTICLES (screen space) ----------------
class Particles{constructor(){this.l=[];}
  burst(x,y,n,c,o={}){for(let i=0;i<n;i++){const a=Math.random()*7,sp=rnd(o.spMin||40,o.spMax||180);this.l.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(o.up||0),life:rnd(o.lifeMin||.3,o.lifeMax||.7),max:.7,size:rnd(o.sizeMin||2,o.sizeMax||4),c,grav:o.grav==null?260:o.grav});}if(this.l.length>600)this.l.splice(0,this.l.length-600);}
  update(dt){for(const p of this.l){p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.grav*dt;p.vx*=.96;}this.l=this.l.filter(p=>p.life>0);}
  draw(ctx){for(const p of this.l){ctx.globalAlpha=clamp(p.life/p.max,0,1);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill();}ctx.globalAlpha=1;}}

// All entities keep gameplay coords: x in [PAD,VW-PAD], worldY forward.
class Player{constructor(x,rs){this.x=x;this.worldY=0;this.r=16;this.rs=rs;this.staff=0;this.hurt=0;this.anim=0;this.dead=false;this.deadT=0;}
  update(dt,g){const L=PAD+this.r,R=VW-PAD-this.r,i=g.input;
    if(i.pointer)this.x=lerp(this.x,i.px,clamp(dt*14,0,1));else if(i.dir)this.x+=i.dir*340*dt;
    this.x=clamp(this.x,L,R);if(this.staff>0)this.staff-=dt;if(this.hurt>0)this.hurt-=dt;this.worldY=g.rs.progress;this.anim+=dt*10;}
}
class Sheep{constructor(x,y){this.x=x;this.worldY=y;this.tx=x;this.ty=y;this.bob=Math.random()*7;}
  set(x,y){this.tx=x;this.ty=y;} update(dt){const t=clamp(dt*7,0,1);this.x=lerp(this.x,this.tx,t);this.worldY=lerp(this.worldY,this.ty,t);this.bob+=dt*7;}}
class Wolf{constructor(x,y,hp,elite){const d=DATA.wolf;this.x=x;this.worldY=y;this.x0=x;this.d=d;this.hp=hp||d.hp;this.maxHp=this.hp;this.elite=!!elite;this.contact=elite?44:d.contact;this.flash=0;this.struck=false;this.alive=true;this.bob=Math.random()*7;}
  hurt(a){this.hp-=a;this.flash=.12;if(this.hp<=0){this.alive=false;return true;}return false;}
  // Wolves hold their ground (they guard a spot); the world scrolls toward them.
  update(dt,g){if(this.flash>0)this.flash-=dt;this.bob+=dt*5;this.x=this.x0+Math.sin(this.bob*0.5)*4;}}
class Boss{constructor(x,y,def){const d=def||DATA.bear;this.x=x;this.worldY=y;this.d=d;this.hp=d.hp;this.maxHp=d.hp;this.alive=true;this.state='approach';this.timer=d.chargeCD;this.windup=0;this.cc=0;this.flash=0;this.tx=x;}
  // Armored (reduced damage) while winding up / charging — caps burst so a
  // strong build can't melt it instantly; vulnerable while tracking.
  hurt(a){if(this.state==='windup'||this.state==='charge')a*=(1-(this.d.armor||0));this.hp-=a;this.flash=.1;if(this.hp<=0){this.alive=false;return true;}return false;}
  update(dt,g){const p=g.player,d=this.d;if(this.flash>0)this.flash-=dt;if(this.cc>0)this.cc-=dt;const gap=this.worldY-p.worldY;
    if(this.state==='approach'){if(gap>175)this.worldY-=d.approach*dt;else{this.state='track';this.timer=d.chargeCD;}}
    else if(this.state==='track'){const dx=p.x-this.x;this.x+=sign(dx)*Math.min(Math.abs(dx),d.moveSpeed*dt);if(gap<150)this.worldY+=d.approach*.5*dt;this.timer-=dt;if(this.timer<=0){this.state='windup';this.windup=d.windup;this.tx=p.x;g.audio.charge();}}
    else if(this.state==='windup'){this.windup-=dt;this.worldY+=d.approach*.4*dt;if(this.windup<=0){this.state='charge';g.shake(7,.25);}}
    else if(this.state==='charge'){this.worldY-=d.charge*dt;const dx=this.tx-this.x;this.x+=sign(dx)*Math.min(Math.abs(dx),d.charge*.5*dt);if(gap<-40){this.state='recover';this.timer=.8;}}
    else if(this.state==='recover'){this.worldY+=d.approach*1.6*dt;this.timer-=dt;if(this.timer<=0&&gap>150){this.state='track';this.timer=d.chargeCD;}}
    this.x=clamp(this.x,PAD+this.d.radius*0.2,VW-PAD-this.d.radius*0.2);}}
class Shot{constructor(x,y,dmg){this.x=x;this.worldY=y;this.dmg=dmg;this.life=1.8;this.alive=true;}
  // Flies straight forward only — the player must line up left/right to aim.
  update(dt){this.worldY+=660*dt;this.life-=dt;if(this.life<=0)this.alive=false;}}
class Gate{constructor(y,l,r){this.worldY=y;this.l=l;this.r=r;this.alive=true;this.used=false;}}

class RunState{constructor(stage){const s=(stage&&stage.stats)||BASE_STATS;const init=stage?stage.initialSheep:8;Object.assign(this,{hp:s.hp,maxHp:s.maxHp,initialSheep:init,sheep:init,sheepLost:0,
  slingProjectiles:s.slingProjectiles,slingDamage:s.slingDamage,slingCooldown:s.slingCooldown,stones:s.stones,stoneRegen:s.stoneRegen,stoneMax:s.stoneMax,stonesCollected:s.stones,
  staffDamage:s.staffDamage,staffRange:s.staffRange,staffCooldown:s.staffCooldown,shield:0,speedMul:1,mudTimer:0,_mud:1,progress:0,wolves:0,bossDefeated:false,score:0,combo:0,comboTimer:0,bonusCoins:0,status:'ready'});}
  changeSheep(d){if(d<0)this.sheepLost+=Math.min(this.sheep,-d);this.sheep=Math.max(0,this.sheep+d);}
  mud(m,d){this._mud=m;this.mudTimer=Math.max(this.mudTimer,d);}
  update(dt){if(this.stoneRegen>0&&this.stones<this.stoneMax){const g=this.stoneRegen*dt;this.stones=Math.min(this.stoneMax,this.stones+g);this.stonesCollected+=g;}
    if(this.mudTimer>0){this.mudTimer-=dt;this.speedMul=this._mud;}else this.speedMul=1;if(this.comboTimer>0){this.comboTimer-=dt;if(this.comboTimer<=0)this.combo=0;}}
  get sheepRatio(){return this.initialSheep>0?this.sheep/this.initialSheep:0;} get hpRatio(){return this.maxHp>0?this.hp/this.maxHp:0;}}

// ============================== GAME =================================
class Game{
  constructor(){this.canvas=document.getElementById('game');this.ctx=this.canvas.getContext('2d');this.audio=A;this.particles=new Particles();
    this.shakeT=0;this.shakeMag=0;this.flashT=0;this.flashCol='#fff';this.floaters=[];
    this.save=Save.load();this.best=this.save.best||0;
    // user-picked tone overrides the stage biome when set; else stage decides
    this.userPal=this.save.settings.palette;if(this.userPal&&!PALETTES[this.userPal])this.userPal=null;
    this.stages=STAGES;this.stagesCleared=this.save.stagesCleared;this.curStageIdx=0;this.stage=STAGES[0];this.refreshPalette();
    this.fxOn=this.save.settings.fx!==false;this.motes=[];
    this.bloom=document.createElement('canvas');this.bloom.width=Math.round(VW*0.5);this.bloom.height=Math.round(VH*0.5);this.bctx=this.bloom.getContext('2d');
    this.paused=false;this.prevStatus=null;
    this.titleT=0;this.input=new Input(this);
    this.dom={hud:document.getElementById('hud'),start:document.getElementById('startScreen'),result:document.getElementById('resultScreen'),
      hp:document.getElementById('hHp'),sheep:document.getElementById('hSheep'),sheepMax:document.getElementById('hSheepMax'),sling:document.getElementById('hSling'),stones:document.getElementById('hStones'),
      shield:document.getElementById('hShield'),wolves:document.getElementById('hWolves'),score:document.getElementById('hScore'),combo:document.getElementById('comboBadge'),
      prog:document.getElementById('progFill'),progBear:document.getElementById('progBear'),bossCard:document.getElementById('bossCard'),bossFill:document.querySelector('#bossBar>i'),bossLabel:document.getElementById('bossLabel'),
      resultBody:document.getElementById('resultBody'),best:document.getElementById('bestLine'),mute:document.getElementById('mute'),
      pauseBtn:document.getElementById('pauseBtn'),pauseScreen:document.getElementById('pauseScreen'),
      titleSw:document.getElementById('titleSwatches'),pauseSw:document.getElementById('pauseSwatches'),
      stageSel:document.getElementById('stageSelect'),subtitle:document.getElementById('subtitle'),
      wallet:document.getElementById('walletLine'),achScreen:document.getElementById('achScreen'),
      achList:document.getElementById('achList'),achHdr:document.getElementById('achHdr'),
      shopScreen:document.getElementById('shopScreen'),shopList:document.getElementById('shopList'),shopWallet:document.getElementById('shopWallet')};
    this.resize();window.addEventListener('resize',()=>this.resize());
    const sbtn=document.getElementById('startBtn');if(sbtn)sbtn.addEventListener('click',()=>this.start(this.curStageIdx));
    document.getElementById('againBtn').addEventListener('click',()=>this.start(this.curStageIdx));
    this.dom.mute.addEventListener('click',()=>{this.audio.muted=!this.audio.muted;this.dom.mute.textContent=this.audio.muted?'🔇':'🔊';});
    if(this.dom.pauseBtn)this.dom.pauseBtn.addEventListener('click',()=>this.togglePause());
    const rb=document.getElementById('resumeBtn');if(rb)rb.addEventListener('click',()=>this.resume());
    this.dom.fxBtn=document.getElementById('fxBtn');if(this.dom.fxBtn){this.dom.fxBtn.addEventListener('click',()=>this.toggleFx());this.updateFxLabel();}
    const ab=document.getElementById('achBtn');if(ab)ab.addEventListener('click',()=>this.openAch());
    const ac=document.getElementById('achClose');if(ac)ac.addEventListener('click',()=>this.closeAch());
    const mb=document.getElementById('menuBtn');if(mb)mb.addEventListener('click',()=>this.toTitle());
    const shb=document.getElementById('shopBtn');if(shb)shb.addEventListener('click',()=>this.openShop());
    const shc=document.getElementById('shopClose');if(shc)shc.addEventListener('click',()=>this.closeShop());
    this.buildPaletteUI();this.buildStageUI();this.updateWallet();
    if(this.best>0)this.dom.best.textContent='최고 점수: '+this.best;
    this.initRun();}

  // ---- palette selection (title + pause), persisted in localStorage ----
  buildPaletteUI(){const make=host=>{if(!host)return;host.innerHTML='';for(const id of PALETTE_ORDER){const p=PALETTES[id];
    const b=document.createElement('button');b.className='sw'+(id===this.palId?' on':'');b.dataset.pal=id;b.title=p.name;
    b.style.background=p.swatch;b.innerHTML='<span>'+p.name+'</span>';
    b.addEventListener('click',()=>this.setPalette(id));host.appendChild(b);}};
    make(this.dom.titleSw);make(this.dom.pauseSw);}
  setPalette(id){if(!PALETTES[id])return;this.userPal=id;this.save.settings.palette=id;Save.save();this.refreshPalette();}
  // active palette = user override if chosen, else the current stage's biome
  refreshPalette(){this.palId=(this.userPal&&PALETTES[this.userPal])?this.userPal:this.stage.palette;this.pal=PALETTES[this.palId];this.highlightSwatch();}
  highlightSwatch(){if(!this.dom)return;for(const host of [this.dom.titleSw,this.dom.pauseSw]){if(!host)continue;for(const b of host.children)b.classList.toggle('on',b.dataset.pal===this.palId);}}
  // ---- stage unlock state (stage 4 will fold this into the full save) ----
  saveCleared(){Save.save();}
  stageUnlocked(i){if(REVIEW_UNLOCK_ALL)return true;return i===0||this.stagesCleared.includes(STAGES[i-1].id)||(this.save.owned.stagesUnlocked||[]).includes(STAGES[i].id);}
  buildStageUI(){const host=this.dom.stageSel;if(!host)return;host.innerHTML='';
    STAGES.forEach((s,i)=>{const open=this.stageUnlocked(i),cleared=this.stagesCleared.includes(s.id);
      const b=document.createElement('button');b.className='stageBtn'+(open?'':' locked');b.dataset.idx=i;
      b.innerHTML='<i class="biome" style="background:'+PALETTES[s.palette].swatch+'"></i>'+
        '<span class="nm">'+s.name+'</span>'+
        '<span class="tag">'+(open?(cleared?'★ 클리어':'PLAY'):'🔒')+'</span>';
      if(open)b.addEventListener('click',()=>this.start(i));host.appendChild(b);});}
  // ---- wallet + achievements screen ----
  updateWallet(){if(!this.dom||!this.dom.wallet)return;const w=this.save.wallet;
    this.dom.wallet.innerHTML='🪙 '+w.coins+'   📖 '+w.chapter_points+'   🔑 '+w.unlock_tokens;}
  renderAch(){if(!this.dom.achList)return;const sv=this.save;let h='';
    for(const a of DATA.achievements){const got=sv.achievementsUnlocked.includes(a.id);
      const pr=a.prog?'<span class="apg">'+a.prog(sv)+'</span>':'';
      h+='<div class="achRow'+(got?' got':'')+'"><span class="aic">'+(got?'✓':'🔒')+'</span><span class="alb">'+a.label+'</span>'+pr+'</div>';}
    const done=sv.achievementsUnlocked.filter(id=>DATA.achievements.some(a=>a.id===id)).length;
    if(this.dom.achHdr)this.dom.achHdr.textContent='업적  '+done+' / '+DATA.achievements.length;
    this.dom.achList.innerHTML=h;}
  openAch(){this.renderAch();if(this.dom.achScreen){this.dom.achScreen.classList.remove('hidden');this.dom.achScreen.classList.add('show');}}
  closeAch(){if(this.dom.achScreen){this.dom.achScreen.classList.add('hidden');this.dom.achScreen.classList.remove('show');}}
  // back to the title/stage-select from the result screen
  toTitle(){this.paused=false;this.rs.status='ready';this.buildStageUI();this.updateWallet();
    this.dom.result.classList.add('hidden');this.dom.result.classList.remove('show');
    this.dom.hud.classList.add('hidden');
    this.dom.start.classList.remove('hidden');this.dom.start.classList.add('show');}

  // ---- meta: shepherd traits (sidegrades) applied to the fresh run state ----
  applyShepherd(){const id=(this.save.equipped&&this.save.equipped.shepherd)||'david';
    const sh=SHEPHERDS.find(s=>s.id===id)||SHEPHERDS[0];this.shepherd=sh;const t=sh.trait,rs=this.rs;if(!t)return;
    if(t.slingProjectiles)rs.slingProjectiles=Math.min(5,rs.slingProjectiles+t.slingProjectiles);
    if(t.slingDamage)rs.slingDamage=Math.max(2,rs.slingDamage+t.slingDamage);
    if(t.staffDamage)rs.staffDamage=Math.max(2,rs.staffDamage+t.staffDamage);
    if(t.stoneMax)rs.stoneMax+=t.stoneMax;
    if(t.stoneRegenMul)rs.stoneRegen*=t.stoneRegenMul;
    if(t.shield)rs.shield+=t.shield;}

  // ---- shop: spend currency on variety/sidegrades/cosmetics (no power skip) ----
  costStr(c){if(!c)return '무료';const ic={coins:'🪙',chapter_points:'📖',unlock_tokens:'🔑'};return Object.keys(c).map(k=>ic[k]+c[k]).join(' ');}
  canAfford(c){if(!c)return true;const w=this.save.wallet;for(const k in c)if((w[k]||0)<c[k])return false;return true;}
  spend(c){if(!c)return true;if(!this.canAfford(c))return false;const w=this.save.wallet;for(const k in c)w[k]-=c[k];Save.save();this.updateWallet();return true;}
  buyShepherd(id){const sh=SHEPHERDS.find(s=>s.id===id);if(!sh)return;const owned=this.save.owned.shepherds;
    if(!owned.includes(id)){if(!this.spend(sh.cost))return;owned.push(id);}
    this.save.equipped.shepherd=id;Save.save();this.renderShop();}
  buyGate(id){const g=SHOP_GATES.find(x=>x.id===id);if(!g)return;const owned=this.save.owned.gates;
    if(owned.includes(id))return;if(!this.spend(g.cost))return;owned.push(id);Save.save();this.renderShop();}
  buyStageUnlock(i){if(REVIEW_UNLOCK_ALL)return;const s=STAGES[i];if(!s||this.stageUnlocked(i))return;
    const cost={chapter_points:2+i};if(!this.spend(cost))return;
    (this.save.owned.stagesUnlocked||(this.save.owned.stagesUnlocked=[])).push(s.id);Save.save();this.buildStageUI();this.renderShop();}
  toggleSupply(){this.save.settings.supply=!this.save.settings.supply;Save.save();this.renderShop();}
  openShop(){this.renderShop();if(this.dom.shopScreen){this.dom.shopScreen.classList.remove('hidden');this.dom.shopScreen.classList.add('show');}}
  closeShop(){if(this.dom.shopScreen){this.dom.shopScreen.classList.add('hidden');this.dom.shopScreen.classList.remove('show');}}
  renderShop(){const host=this.dom.shopList;if(!host)return;const sv=this.save;let h='';
    h+='<div class="shopSec">양치기 <span class="dim">(특성 = 트레이드오프)</span></div>';
    for(const s of SHEPHERDS){const owned=sv.owned.shepherds.includes(s.id),eq=sv.equipped.shepherd===s.id;
      const can=owned||this.canAfford(s.cost);
      const act=eq?'<span class="tagx on">장착됨</span>':(owned?'<button class="buy" data-eq="'+s.id+'">장착</button>':'<button class="buy'+(can?'':' no')+'" data-sh="'+s.id+'">'+this.costStr(s.cost)+'</button>');
      h+='<div class="shopRow"><i class="dot" style="background:'+s.color.base+'"></i><div class="info"><b>'+s.name+'</b><span>'+s.desc+'</span></div>'+act+'</div>';}
    h+='<div class="shopSec">게이트 해금 <span class="dim">(드래프트 다양성)</span></div>';
    for(const g of SHOP_GATES){const owned=sv.owned.gates.includes(g.id),can=this.canAfford(g.cost);
      const act=owned?'<span class="tagx on">해금됨</span>':'<button class="buy'+(can?'':' no')+'" data-gate="'+g.id+'">'+this.costStr(g.cost)+'</button>';
      h+='<div class="shopRow"><i class="dot" style="background:#6aa0ff"></i><div class="info"><b>'+g.name+'</b><span>'+g.desc+'</span></div>'+act+'</div>';}
    h+='<div class="shopSec">런 옵션</div>';
    const sup=sv.settings.supply;
    h+='<div class="shopRow"><i class="dot" style="background:#ffd24a"></i><div class="info"><b>출발 보급</b><span>매 판 시작 시 🪙'+SUPPLY_COST+' 소모 → 돌 +12 · 보호막 +1</span></div><button class="buy" data-supply="1">'+(sup?'켜짐':'꺼짐')+'</button></div>';
    if(!REVIEW_UNLOCK_ALL){h+='<div class="shopSec">스테이지 해금 <span class="dim">(📖 챕터 포인트)</span></div>';
      STAGES.forEach((s,i)=>{if(this.stageUnlocked(i))return;h+='<div class="shopRow"><i class="dot" style="background:'+PALETTES[s.palette].swatch+'"></i><div class="info"><b>'+s.name+'</b><span>미리 해금</span></div><button class="buy" data-stage="'+i+'">📖'+(2+i)+'</button></div>';});}
    host.innerHTML=h;
    host.querySelectorAll('[data-sh]').forEach(b=>b.addEventListener('click',()=>this.buyShepherd(b.dataset.sh)));
    host.querySelectorAll('[data-eq]').forEach(b=>b.addEventListener('click',()=>this.buyShepherd(b.dataset.eq)));
    host.querySelectorAll('[data-gate]').forEach(b=>b.addEventListener('click',()=>this.buyGate(b.dataset.gate)));
    host.querySelectorAll('[data-supply]').forEach(b=>b.addEventListener('click',()=>this.toggleSupply()));
    host.querySelectorAll('[data-stage]').forEach(b=>b.addEventListener('click',()=>this.buyStageUnlock(+b.dataset.stage)));
    if(this.dom.shopWallet){const w=sv.wallet;this.dom.shopWallet.innerHTML='🪙 '+w.coins+'   📖 '+w.chapter_points+'   🔑 '+w.unlock_tokens;}}
  toggleFx(){this.fxOn=!this.fxOn;this.save.settings.fx=this.fxOn;Save.save();this.updateFxLabel();}
  updateFxLabel(){if(this.dom&&this.dom.fxBtn)this.dom.fxBtn.textContent=this.fxOn?'✨ 이펙트: 가득':'🔅 이펙트: 줄임';}
  togglePause(){if(this.paused)this.resume();else this.pause();}
  pause(){if(this.paused)return;const s=this.rs.status;if(s!=='running'&&s!=='boss')return;this.paused=true;this.prevStatus=s;
    if(this.dom.pauseScreen){this.dom.pauseScreen.classList.remove('hidden');this.dom.pauseScreen.classList.add('show');}}
  resume(){if(!this.paused)return;this.paused=false;
    if(this.dom.pauseScreen){this.dom.pauseScreen.classList.add('hidden');this.dom.pauseScreen.classList.remove('show');}}

  genProps(){_seed=42;const a=[],len=this.stage.length+400;for(let i=0;i<90;i++){a.push({y:srnd()*len-150,x:(srnd()*2-1)*(TRACK_HALF+1.1),k:srnd()<.5?'tuft':(srnd()<.6?'flower':'rock'),s:.7+srnd()*.7,c:srnd()});}return a;}
  resize(){const dpr=window.devicePixelRatio||1,aw=window.innerWidth,ah=window.innerHeight;let w=aw,h=w/(VW/VH);if(h>ah){h=ah;w=h*(VW/VH);}
    const f=document.getElementById('frame');f.style.width=w+'px';f.style.height=h+'px';
    this.canvas.style.width=w+'px';this.canvas.style.height=h+'px';this.canvas.width=Math.round(w*dpr);this.canvas.height=Math.round(h*dpr);this.scale=(w*dpr)/VW;}
  toV(cx,cy){const r=this.canvas.getBoundingClientRect();return{x:(cx-r.left)/r.width*VW,y:(cy-r.top)/r.height*VH};}

  initRun(){this.props=this.genProps();this.rs=new RunState(this.stage);this.applyShepherd();
    if(this._supply){this.rs.stones=Math.min(this.rs.stoneMax,this.rs.stones+12);this.rs.shield+=1;}
    this.player=new Player(VW/2,this.rs);this.sheep=[];this.wolves=[];this.shots=[];this.gates=[];this.stonePickups=[];this.boss=null;this.result=null;
    this.gatePlan=this.genGatePlan();this.enemyPlan=this.genEnemyPlan();this.stonePlan=this.genStonePlan();
    this.spawned={gate:this.gatePlan.map(()=>false),enemy:this.enemyPlan.map(()=>false),stone:this.stonePlan.map(()=>false),boss:false};this.slingT=0;this.staffT=0;this.floaters=[];this.particles.l.length=0;
    for(let i=0;i<this.rs.initialSheep;i++){const s=this.slot(i);this.sheep.push(new Sheep(s.x,s.y));}}

  // Roguelike: random balanced gate pairs along the whole level.
  genGatePlan(){const plan=[],bossY=this.stage.length;let y=460;
    while(y<bossY-500){plan.push({y,...this.pickPair()});y+=rnd(620,900);}return plan;}
  // active draft pool = base gates + any locked gates unlocked in the shop
  activeGates(){const owned=this.save.owned.gates||[];return GATE_POOL.filter(g=>!g.locked||owned.includes(g.id));}
  pickPair(){const pool=this.activeGates();const a=this.wPick(pool);let b,tries=0;
    do{b=this.wPick(pool);tries++;}while((b.id===a.id||b.cat===a.cat)&&tries<10);
    return {left:a,right:b};}
  wPick(pool){let tot=0;for(const g of pool)tot+=g.w;let r=Math.random()*tot;for(const g of pool){r-=g.w;if(r<=0)return g;}return pool[0];}
  // Fixed wolf guards spread across the level; HP scales gently with depth.
  // Density/HP/elite rate all come from the current stage's spawn params.
  genEnemyPlan(){const sp=this.stage.spawn,plan=[],bossY=this.stage.length;let y=620;
    while(y<bossY-200){const f=y/bossY;const pack=Math.random()<sp.packChance?2:1;
      const baseHp=Math.round(sp.hpBase+f*f*sp.hpRamp);
      const elite=y>sp.eliteAfterY&&Math.random()<sp.eliteRate; // tanky, threatening guards
      for(let k=0;k<pack;k++)plan.push({y:y+k*46,x:0.18+Math.random()*0.64,hp:elite?Math.round(baseHp*3.2):baseHp,elite});
      y+=rnd(sp.gapMin,sp.gapMax);}return plan;}
  // Collectible stone piles scattered down the field; player must steer onto them.
  genStonePlan(){const sp=this.stage.spawn,plan=[],bossY=this.stage.length;let y=520;
    while(y<bossY-300){plan.push({y,x:(0.16+Math.random()*0.68)*VW,v:3});y+=rnd(sp.stoneGapMin,sp.stoneGapMax);}return plan;}
  start(idx){if(typeof idx==='number'&&STAGES[idx]&&this.stageUnlocked(idx)){this.curStageIdx=idx;this.stage=STAGES[idx];this.refreshPalette();}
    this.audio.init();this.audio.resume();this.paused=false;if(this.dom.pauseScreen){this.dom.pauseScreen.classList.add('hidden');this.dom.pauseScreen.classList.remove('show');}
    // optional per-run starting supply (coins spent each run, not permanent)
    this._supply=false;if(this.save.settings.supply&&this.save.wallet.coins>=SUPPLY_COST){this.save.wallet.coins-=SUPPLY_COST;this._supply=true;Save.save();this.updateWallet();}
    this.initRun();this.rs.status='running';this.dom.start.classList.add('hidden');this.dom.start.classList.remove('show');
    this.dom.result.classList.add('hidden');this.dom.result.classList.remove('show');this.dom.hud.classList.remove('hidden');}
  shake(m,t){this.shakeMag=Math.max(this.shakeMag,m);this.shakeT=Math.max(this.shakeT,t);}
  flash(c,t){this.flashCol=c;this.flashT=t;}
  floater(txt,X,Y,Z,col){const p=this.project(X,Y,Z);if(p)this.floaters.push({x:p.x,y:p.y,txt,life:1,max:1,col:col||'#fff'});}
  slot(i){const PR=4,row=Math.floor(i/PR),col=i%PR,ox=(col-(PR-1)/2)*20;return{x:this.player.x+ox,y:this.player.worldY-34-row*22};}

  // -------- 3D projection: gameplay -> world units -> screen --------
  wx3(x){return (x-VW/2)/(VW/2-PAD)*TRACK_HALF;}
  wz3(worldY){return (worldY-this.player.worldY)*FWD;}
  project(X,Y,Z){ // world units (X right, Y up, Z forward from player)
    const x=X, y=Y-CAM.y, z=Z+CAM.back, c=Math.cos(CAM.pitch), s=Math.sin(CAM.pitch);
    const y2=y*c+z*s, z2=-y*s+z*c; if(z2<0.06)return null;
    return {x:VW/2+FOCAL*x/z2, y:VH/2-FOCAL*y2/z2, scale:FOCAL/z2, z:z2};}

  // ============================ UPDATE =============================
  update(dt){if(this.paused)return;this.titleT+=dt;
    if(this.shakeT>0){this.shakeT-=dt;if(this.shakeT<=0)this.shakeMag=0;}
    if(this.flashT>0)this.flashT-=dt;this.particles.update(dt);
    const st=this.rs.status;
    if(st==='ready'){return;}
    if(st==='win'||st==='fail'){ if(this.player.dead)this.player.deadT+=dt; return; }
    this.rs.update(dt);this.player.update(dt,this);
    if(st==='running'){const S=this.stage;const ramp=1+this.rs.progress/S.length*S.speedRamp;this.rs.progress+=S.runSpeed*ramp*this.rs.speedMul*dt;}

    this.spawnStuff();
    const want=this.rs.sheep;
    while(this.sheep.length<want)this.sheep.push(new Sheep(this.player.x,this.player.worldY-60));
    while(this.sheep.length>want&&this.sheep.length>0)this.sheep.pop();
    for(let i=0;i<this.sheep.length;i++){const s=this.slot(i);this.sheep[i].set(s.x,s.y);this.sheep[i].update(dt);}
    for(const w of this.wolves)w.update(dt,this);
    for(const s of this.stonePickups)s.update(dt);
    if(this.boss)this.boss.update(dt,this);
    this.combat(dt);this.collisions();
    this.wolves=this.wolves.filter(w=>w.alive);this.shots=this.shots.filter(s=>s.alive);this.gates=this.gates.filter(g=>g.alive);this.stonePickups=this.stonePickups.filter(s=>s.alive);
    if(st!=='win'&&st!=='fail'&&this.rs.hp<=0)this.finish(false);
    this.updateHUD();}

  spawnStuff(){const pr=this.rs.progress,look=820,bossY=this.stage.length;
    this.gatePlan.forEach((g,i)=>{if(!this.spawned.gate[i]&&pr>g.y-look){this.spawned.gate[i]=true;this.gates.push(new Gate(g.y,g.left,g.right));}});
    this.enemyPlan.forEach((e,i)=>{if(!this.spawned.enemy[i]&&pr>e.y-look){this.spawned.enemy[i]=true;this.wolves.push(new Wolf(e.x*VW,e.y,e.hp,e.elite));}});
    this.stonePlan.forEach((s,i)=>{if(!this.spawned.stone[i]&&pr>s.y-look){this.spawned.stone[i]=true;this.stonePickups.push(new StonePickup(s.x,s.y,s.v));}});
    if(!this.spawned.boss&&pr>=bossY-200){this.spawned.boss=true;this.boss=new Boss(VW/2,this.player.worldY+330,this.stage.boss);this.rs.status='boss';this.audio.roar();this.shake(8,.4);this.flash('rgba(120,40,20,.4)',.3);}}

  combat(dt){const rs=this.rs;if(this.slingT>0)this.slingT-=dt;if(this.staffT>0)this.staffT-=dt;
    if(this.slingT<=0&&rs.stones>=1){const t=this.nearest();if(t){
      // Each projectile costs one stone. Low on stones => fire fewer this volley,
      // so a wide build literally runs the ammo dry and firing thins out.
      const n=rs.slingProjectiles,fire=Math.min(n,Math.floor(rs.stones));
      if(fire>=1){this.slingT=rs.slingCooldown;rs.stones-=fire;this.audio.sling();
        // Per-shot damage is flat; the projectile/damage trade-off is baked into
        // slingDamage at the moment a projectile is gained (see applyFx).
        const step=20,sx=this.player.x-((fire-1)*step)/2,pd=rs.slingDamage;
        for(let i=0;i<fire;i++){const px=sx+i*step;this.shots.push(new Shot(px,this.player.worldY+18,pd));}}}}
    if(this.staffT<=0){let hit=false;const px=this.player.x,py=this.player.worldY,rg=rs.staffRange;
      for(const w of this.wolves){if(w.alive&&dist(px,py,w.x,w.worldY)<=rg+w.d.radius){if(w.hurt(rs.staffDamage))this.onWolfKill(w);else this.audio.hit();hit=true;this.fxAt(w.x,0.5,this.wz3(w.worldY),5,'#fff2c4');}}
      {const bb=this.boss;if(bb&&bb.alive&&dist(px,py,bb.x,bb.worldY)<=rg+bb.d.radius){const killed=bb.hurt(rs.staffDamage);hit=true;this.fxAt(bb.x,1,this.wz3(bb.worldY),6,'#ffd9b0');this._dmg('-'+Math.round(rs.staffDamage),bb.x,bb.worldY);if(killed)this.onBossKill();else this.audio.bossHit();}}
      if(hit){this.staffT=rs.staffCooldown;this.player.staff=.18;}}
    for(const s of this.shots)s.update(dt);
    for(const s of this.shots){if(!s.alive)continue;
      for(const w of this.wolves){if(w.alive&&dist(s.x,s.worldY,w.x,w.worldY)<=16+w.d.radius){this.fxAt(s.x,.5,this.wz3(s.worldY),5,'#cfcfcf');if(w.hurt(s.dmg))this.onWolfKill(w);else this.audio.hit();s.alive=false;break;}}
      if(!s.alive)continue;const b=this.boss;if(b&&b.alive&&dist(s.x,s.worldY,b.x,b.worldY)<=16+b.d.radius){this.fxAt(b.x,1,this.wz3(b.worldY),6,'#ffd9b0');this._dmg('-'+Math.round(s.dmg),b.x+rnd(-15,15),b.worldY);if(b.hurt(s.dmg))this.onBossKill();else this.audio.bossHit();s.alive=false;}}}

  _dmg(txt,x,worldY){const p=this.project(this.wx3(x),1.4,this.wz3(worldY));if(p)this.floaters.push({x:p.x,y:p.y,txt,life:.9,max:.9,col:'#ffd76a'});}
  fxAt(x,h,z,n,c){const p=this.project(this.wx3(x),h,z);if(p)this.particles.burst(p.x,p.y,n,c);}
  nearest(){let best=null,bd=1e9,py=this.player.worldY;for(const w of this.wolves){if(!w.alive)continue;const dy=w.worldY-py;if(dy>-10&&dy<bd){bd=dy;best=w;}}if(this.boss&&this.boss.alive){const dy=this.boss.worldY-py;if(dy>-10&&dy<bd)best=this.boss;}return best;}

  collisions(){const p=this.player;
    for(const g of this.gates){if(g.used)continue;if(Math.abs(p.worldY-g.worldY)<=18){const side=p.x<VW/2?g.l:g.r;this.applyGate(side);g.used=true;g.alive=false;}else if(p.worldY-g.worldY>60)g.alive=false;}
    for(const w of this.wolves){if(!w.alive||w.struck)continue;if(dist(w.x,w.worldY,p.x,p.worldY)<=w.contact){w.struck=true;w.alive=false;this.fxAt(w.x,.5,0,w.elite?14:8,w.elite?'#c05050':'#8a8a90');
      const dmg=w.elite?2:1; // enemies damage HP only; sheep are a separate objective
      if(this.rs.shield>0){this.rs.shield-=1;this.floater('막음!',this.wx3(p.x),2,0,'#9cdcff');}
      else{this.rs.hp-=dmg;this.player.hurt=.4;this._dmg('체력 -'+dmg,p.x,p.worldY);this.flash('rgba(200,40,40,.45)',.25);this.shake(w.elite?7:5,.2);this.audio.hit();}}else if(w.worldY<p.worldY-80)w.alive=false;}
    for(const s of this.stonePickups){if(!s.alive)continue;
      if(s.worldY<p.worldY-80){s.alive=false;continue;}
      if(Math.abs(s.worldY-p.worldY)<=24&&Math.abs(s.x-p.x)<=46){s.alive=false;this.rs.stones+=s.v;this.rs.stonesCollected+=s.v;
        this.floater('돌 +'+s.v+'개',this.wx3(s.x),0.85,this.wz3(s.worldY),'#ffe49a');this.fxAt(s.x,0.35,this.wz3(s.worldY),12,'#ffe06a',{spMax:170,up:40});this.audio.stone();}}
    const b=this.boss;if(b&&b.alive&&b.cc<=0&&dist(b.x,b.worldY,p.x,p.worldY)<=b.d.contact){b.cc=.9;
      if(this.rs.shield>0){this.rs.shield-=1;this.floater('막음!',this.wx3(p.x),2,0,'#9cdcff');}else{this.rs.hp-=b.d.dmg;this.player.hurt=.5;this._dmg('체력 -'+b.d.dmg,p.x,p.worldY);this.flash('rgba(200,40,40,.55)',.3);this.shake(11,.35);this.audio.hit();this.fxAt(p.x,.6,0,12,'#ff6a4a');}}}

  applyFx(fx){const rs=this.rs,fxs=Array.isArray(fx)?fx:[fx];let sheepUp=false;const projBefore=rs.slingProjectiles;
    for(const f of fxs){
      if(f.op==='add'){if(f.t==='sheep'){rs.changeSheep(f.v);if(f.v>0)sheepUp=true;}else if(f.t==='stones'){rs.stones=Math.max(0,rs.stones+f.v);if(f.v>0)rs.stonesCollected+=f.v;}else rs[f.t]+=f.v;}
      else if(f.op==='mul')rs[f.t]*=f.v;
      else if(f.op==='addHp')rs.hp=Math.min(rs.maxHp,rs.hp+f.v);
      else if(f.op==='special'){if(f.t==='shield')rs.shield+=f.v;else if(f.t==='mud')rs.mud(f.v,f.d);}
    }
    rs.slingProjectiles=Math.min(5,rs.slingProjectiles);rs.slingCooldown=Math.max(0.3,rs.slingCooldown);
    // Gaining a projectile ALWAYS lowers per-shot damage at the same time.
    const projGain=rs.slingProjectiles-projBefore;if(projGain>0)rs.slingDamage=Math.max(2,rs.slingDamage*Math.pow(0.7,projGain));
    return sheepUp;}
  applyGate(g){const sheepUp=this.applyFx(g.fx);
    const col=g.tone==='neg'?'#ffcf6a':'#bff0a0';const pp=this.project(0,2.1,0.15);if(pp)this.floaters.push({x:pp.x,y:pp.y,txt:g.label,life:1.2,max:1.2,col});
    if(g.tone==='neg'){this.audio.gateBad();this.flash('rgba(150,110,30,.2)',.2);}else this.audio.gateGood();
    this.fxAt(VW/2,1.4,.15,14,col);if(sheepUp)this.audio.sheepUp();}

  onWolfKill(w){this.rs.wolves++;this.rs.combo++;this.rs.comboTimer=2.5;const b=10*this.rs.combo;this.rs.score+=b;this.audio.kill();this.fxAt(w.x,.5,this.wz3(w.worldY),12,'#9a9aa2');this.shake(2.5,.12);this._dmg('+'+b+(this.rs.combo>1?' x'+this.rs.combo:''),w.x,w.worldY);
    if(w.elite){const d=pick(ELITE_DROPS);this.applyFx(d.fx);this.rs.bonusCoins+=25;this.rs.score+=150;this.audio.gateGood();this.audio.sheepUp();
      this.fxAt(w.x,1,this.wz3(w.worldY),24,'#ffd24a',{spMax:280});this.shake(5,.22);this.flash('rgba(255,210,90,.18)',.2);
      const p=this.project(this.wx3(w.x),1.95,this.wz3(w.worldY));if(p)this.floaters.push({x:p.x,y:p.y,txt:'엘리트 처치! '+d.label+' · +25코인',life:1.7,max:1.7,col:'#ffe06a'});}}
  onBossKill(){this.rs.bossDefeated=true;this.rs.score+=500;if(this.boss)this.fxAt(this.boss.x,1,this.wz3(this.boss.worldY),40,'#ffd9b0',{spMax:300});this.boss=null;this.audio.win();this.shake(12,.6);this.flash('rgba(255,240,200,.5)',.4);this.finish(true);}

  finish(win){const rs=this.rs;const real=win&&rs.hp>0;rs.status=real?'win':'fail';
    let reason='';if(!real){this.audio.lose();this.player.dead=true;this.player.deadT=0;this.flash('rgba(150,20,20,.55)',.5);this.shake(9,.4);
      reason=this.boss?'곰에게 당하고 말았습니다!':'다윗이 쓰러졌습니다!';}
    let stars=0;if(real){const t=this.stage.stars;if(rs.sheepRatio>=t.three.sheep&&rs.hpRatio>=t.three.hp)stars=3;else if(rs.sheepRatio>=t.two.sheep)stars=2;else stars=1;}
    const stats={sheepSaved:rs.sheep,initialSheep:rs.initialSheep,wolves:rs.wolves,win:real,stones:Math.floor(rs.stonesCollected),sheepLost:rs.sheepLost,hp:rs.hp,maxHp:rs.maxHp};
    const R=DATA.rewards,mult=this.stage.rewardMult||1,rw={coins:0,chapter_points:0,unlock_tokens:0},add=o=>{for(const k in o)rw[k]=(rw[k]||0)+o[k];};
    if(stars>0){add(R.base);for(let i=0;i<stars;i++)add(R.perStar);if(stars>=3)add(R.three);}
    rw.coins+=R.perWolf.coins*rs.wolves+R.perSheep.coins*rs.sheep+rs.bonusCoins;
    rw.coins=Math.round(rw.coins*mult);rw.chapter_points=Math.round(rw.chapter_points*mult);
    rs.score+=stars*250+rs.sheep*20;
    // ---- persist: best, bank wallet, totals, cleared stage, achievements ----
    const sv=this.save;if(rs.score>this.best)this.best=rs.score;sv.best=this.best;
    const bps=sv.bestPerStage;if(!bps[this.stage.id]||rs.score>bps[this.stage.id])bps[this.stage.id]=rs.score;
    sv.wallet.coins+=rw.coins;sv.wallet.chapter_points+=rw.chapter_points;sv.wallet.unlock_tokens+=rw.unlock_tokens;
    sv.totals.coinsEarned+=rw.coins;sv.totals.cpEarned+=rw.chapter_points;sv.totals.tokensEarned+=rw.unlock_tokens;
    sv.totals.runs++;sv.totals.wolves+=rs.wolves;sv.totals.sheepSaved+=rs.sheep;if(real)sv.totals.wins++;
    let nextName=null;if(real){if(!this.stagesCleared.includes(this.stage.id)){this.stagesCleared.push(this.stage.id);this.buildStageUI();}
      const ni=this.curStageIdx+1;if(STAGES[ni])nextName=STAGES[ni].name;}
    // evaluate achievements AFTER totals/cleared update; persist only new unlocks
    const satisfied=DATA.achievements.filter(a=>{try{return a.c(stats,sv)}catch(e){return false}});
    const newly=satisfied.filter(a=>!sv.achievementsUnlocked.includes(a.id));
    for(const a of newly)sv.achievementsUnlocked.push(a.id);
    Save.save();this.updateWallet();
    this.result={win:real,stars,reason,sheepSaved:rs.sheep,initialSheep:rs.initialSheep,wolves:rs.wolves,bossDefeated:rs.bossDefeated,rewards:rw,ach:newly,score:rs.score,stageName:this.stage.name,nextName};
    this.showResult();}

  showResult(){const r=this.result;let h='<h1>'+(r.win?'승리!':'패배...')+'</h1>';
    if(r.stageName)h+='<div class="sub" style="margin-top:2px">'+r.stageName+'</div>';
    if(!r.win&&r.reason)h+='<div class="reason">'+r.reason+'</div>';
    let st='';for(let i=0;i<3;i++)st+=i<r.stars?'★':'☆';h+='<div class="stars" style="color:#ffd76a">'+st+'</div>';
    h+='<div class="stat">구한 양: '+r.sheepSaved+' / '+r.initialSheep+'</div>';
    h+='<div class="stat">처치한 늑대: '+r.wolves+'</div>';
    h+='<div class="stat">곰 처치: '+(r.bossDefeated?'성공':'실패')+'</div>';
    h+='<div class="stat" style="font-weight:800;color:#ffe06a">점수: '+r.score+'</div>';
    h+='<div class="sec" style="color:#ffe7a0">보상</div>';
    for(const k in r.rewards){if(r.rewards[k]>0)h+='<div class="rewards">'+DATA.rewardLabel[k]+': +'+r.rewards[k]+'</div>';}
    if(r.ach.length){h+='<div class="sec" style="color:#a0d8ff">🆕 신규 업적!</div>';for(const a of r.ach)h+='<div class="ach">✓ '+a.label+'</div>';}
    if(r.win&&r.nextName)h+='<div class="ach" style="color:#ffe7a0;margin-top:8px">다음 스테이지: '+r.nextName+'</div>';
    this.dom.resultBody.innerHTML=h;this.dom.result.className='overlay show'+(r.win?' win':' lose');}

  updateHUD(){const rs=this.rs,d=this.dom;
    d.hp.innerHTML='<span class="heartOn">'+'♥'.repeat(Math.max(0,rs.hp))+'</span><span class="heartOff">'+'♥'.repeat(Math.max(0,rs.maxHp-rs.hp))+'</span>';
    d.sheep.textContent=rs.sheep;d.sheepMax.textContent=' / '+rs.initialSheep;
    d.sling.textContent='슬링 '+rs.slingProjectiles+'발·'+Math.round(rs.slingDamage);d.stones.textContent='돌 '+Math.floor(rs.stones);
    if(rs.shield>0){d.shield.style.display='';d.shield.textContent='보호막 '+rs.shield;}else d.shield.style.display='none';
    d.wolves.textContent=rs.wolves;d.score.textContent=rs.score;
    const pct=Math.min(100,rs.progress/this.stage.length*100);d.prog.style.width=pct+'%';d.progBear.style.left=pct+'%';
    if(rs.combo>1){d.combo.classList.remove('hidden');d.combo.textContent='콤보 x'+rs.combo;}else d.combo.classList.add('hidden');
    if(this.boss&&this.boss.alive){d.bossCard.style.display='block';d.bossFill.style.width=Math.max(0,this.boss.hp/this.boss.maxHp*100)+'%';d.bossLabel.textContent=(this.boss.d.label||'곰')+'   '+Math.max(0,Math.ceil(this.boss.hp))+' / '+this.boss.maxHp;}
    else d.bossCard.style.display='none';}

  // ============================ RENDER =============================
  render(){const ctx=this.ctx;ctx.setTransform(this.scale,0,0,this.scale,0,0);
    let ox=0,oy=0;if(this.shakeT>0){ox=rnd(-1,1)*this.shakeMag;oy=rnd(-1,1)*this.shakeMag;}
    ctx.clearRect(0,0,VW,VH);ctx.save();ctx.translate(ox,oy);
    this.drawWorld(ctx);
    // collect drawables sorted far->near
    const items=[];
    for(const g of this.gates)items.push({z:g.worldY-this.player.worldY,k:'gate',o:g});
    for(const s of this.sheep)items.push({z:s.worldY-this.player.worldY,k:'sheep',o:s});
    for(const w of this.wolves)items.push({z:w.worldY-this.player.worldY,k:'wolf',o:w});
    for(const s of this.shots)items.push({z:s.worldY-this.player.worldY,k:'shot',o:s});
    for(const s of this.stonePickups)items.push({z:s.worldY-this.player.worldY,k:'stone',o:s});
    if(this.boss)items.push({z:this.boss.worldY-this.player.worldY,k:'boss',o:this.boss});
    items.push({z:0,k:'player',o:this.player});
    items.sort((a,b)=>b.z-a.z);
    if(this.boss&&this.boss.state==='windup')this.drawTelegraph(ctx);
    for(const it of items)this['draw_'+it.k](ctx,it.o);
    this.particles.draw(ctx);this.drawFloaters(ctx);
    ctx.restore();
    if(this.flashT>0){ctx.globalAlpha=clamp(this.flashT*3,0,.6);ctx.fillStyle=this.flashCol;ctx.fillRect(0,0,VW,VH);ctx.globalAlpha=1;}
    this.postProcess(ctx);}

  // ---- HD-2D atmospheric post pass (bloom, grade, vignette, motes, grain) ----
  postProcess(ctx){const prof=this.fxOn?POST.full:POST.reduced,pal=this.pal;
    // cheap bloom: blurred half-res copy of the frame, added back over highlights
    if(prof.bloom>0){const bc=this.bctx,bw=this.bloom.width,bh=this.bloom.height;
      bc.clearRect(0,0,bw,bh);bc.filter='blur(3px)';bc.drawImage(this.canvas,0,0,bw,bh);bc.filter='none';
      ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=prof.bloom;ctx.drawImage(this.bloom,0,0,VW,VH);ctx.restore();}
    // colour grade: unify the scene toward the palette tint
    if(prof.grade>0){ctx.save();ctx.globalCompositeOperation='soft-light';
      ctx.globalAlpha=clamp(pal.gradeTint.a*prof.grade*2.6,0,0.9);ctx.fillStyle='rgb('+pal.gradeTint.c+')';ctx.fillRect(0,0,VW,VH);ctx.restore();}
    // vignette
    if(prof.vignette>0){const vg=ctx.createRadialGradient(VW/2,VH*0.55,VH*0.3,VW/2,VH*0.55,VH*0.8);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,'+(0.32*prof.vignette)+')');ctx.fillStyle=vg;ctx.fillRect(0,0,VW,VH);}
    // floating light dust
    if(prof.motes>0){if(!this.paused)this.updateMotes(prof);this.drawMotes(ctx);}else this.motes.length=0;
    // optional grain/scanline (default off)
    if(prof.grain>0){ctx.save();ctx.globalAlpha=0.06*prof.grain;ctx.fillStyle='#000';for(let y=0;y<VH;y+=3)ctx.fillRect(0,y,VW,1);ctx.restore();}}
  updateMotes(prof){const want=prof.motes;
    while(this.motes.length<want)this.motes.push({x:Math.random()*VW,y:Math.random()*VH,r:rnd(0.6,2.2),ph:Math.random()*7,sp:rnd(4,12)});
    while(this.motes.length>want)this.motes.pop();
    for(const m of this.motes){m.y-=m.sp/60;m.ph+=0.02;m.x+=Math.sin(m.ph)*0.3;if(m.y<-4){m.y=VH+4;m.x=Math.random()*VW;}}}
  drawMotes(ctx){ctx.save();ctx.globalCompositeOperation='lighter';for(const m of this.motes){ctx.globalAlpha=0.22+0.2*Math.sin(m.ph*1.7);ctx.fillStyle=this.pal.moteColor+'0.85)';ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,7);ctx.fill();}ctx.restore();}

  drawWorld(ctx){
    const pal=this.pal;
    const hz=this.project(0,0,400),horizon=hz?clamp(hz.y,0,VH):VH*0.36;
    // sky (palette gradient)
    const sky=ctx.createLinearGradient(0,0,0,horizon);const sk=pal.sky;
    for(let i=0;i<sk.length;i++)sky.addColorStop(i/(sk.length-1),sk[i]);
    ctx.fillStyle=sky;ctx.fillRect(0,0,VW,horizon+1);
    // sun/moon glow (palette)
    ctx.save();ctx.globalAlpha=.85;const gx=VW*pal.glow.x,gy=horizon*pal.glow.y,gr0=pal.glow.r;
    const sg=ctx.createRadialGradient(gx,gy,4,gx,gy,gr0);sg.addColorStop(0,'rgba('+pal.glow.c+',.95)');sg.addColorStop(1,'rgba('+pal.glow.c+',0)');
    ctx.fillStyle=sg;ctx.fillRect(gx-gr0,gy-gr0,gr0*2,gr0*2);ctx.restore();
    // distant hills — 3 parallax layers (far->near) scrolling vs worldY
    this.drawHills(ctx,horizon);
    // ground (palette gradient)
    const gr=ctx.createLinearGradient(0,horizon,0,VH);gr.addColorStop(0,pal.ground[0]);gr.addColorStop(1,pal.ground[1]);ctx.fillStyle=gr;ctx.fillRect(0,horizon,VW,VH-horizon);
    // atmospheric perspective: haze band fading the far ground into fog colour
    const prof0=this.fxOn?POST.full:POST.reduced;
    if(prof0.fog>0){const fh=Math.min(VH*0.22,VH-horizon);const fog=ctx.createLinearGradient(0,horizon,0,horizon+fh);
      fog.addColorStop(0,this.hexA(pal.fogColor,0.55*prof0.fog));fog.addColorStop(1,this.hexA(pal.fogColor,0));ctx.fillStyle=fog;ctx.fillRect(0,horizon,VW,fh);}
    // perspective grid (lateral lines scrolling)
    const frac=(this.player.worldY*FWD)%1;ctx.strokeStyle='rgba(255,255,255,'+pal.gridAlpha+')';ctx.lineWidth=1.5;
    for(let k=1;k<=26;k++){const z=k-frac;const a=this.project(-TRACK_HALF*1.6,0,z),b=this.project(TRACK_HALF*1.6,0,z);if(a&&b){ctx.globalAlpha=clamp(1-z/26,.15,1)*.8;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
    ctx.globalAlpha=1;
    // longitudinal lanes
    for(const xx of [-TRACK_HALF,-TRACK_HALF/2,0,TRACK_HALF/2,TRACK_HALF]){const a=this.project(xx,0,0.1),b=this.project(xx,0,26);if(a&&b){ctx.strokeStyle=Math.abs(xx)>=TRACK_HALF-0.01?'rgba(255,255,255,.30)':'rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
    // dirt path center
    const pa=this.project(-0.7,0,0.1),pb=this.project(0.7,0,0.1),pc=this.project(0.45,0,26),pd=this.project(-0.45,0,26);
    if(pa&&pb&&pc&&pd){ctx.fillStyle=this.pal.pathColor;ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pc.x,pc.y);ctx.lineTo(pd.x,pd.y);ctx.closePath();ctx.fill();}
    // props (ground decoration)
    const ps=this.props.map(p=>({p,z:p.y-this.player.worldY})).filter(o=>o.z>0.2&&o.z<1900).sort((a,b)=>b.z-a.z);
    for(const o of ps){const pr=this.project(o.p.x,0,o.z*FWD);if(pr)this.drawProp(ctx,o.p,pr);}
    // finish line
    const fz=(DATA.level.boss.y-this.player.worldY)*FWD;if(fz>0.2&&fz<22){const a=this.project(-TRACK_HALF,0,fz),b=this.project(TRACK_HALF,0,fz);if(a&&b){ctx.fillStyle='rgba(255,255,255,.5)';const seg=10;for(let i=0;i<seg;i++){if(i%2)continue;ctx.fillStyle=i%4<2?'#fff':'#222';ctx.fillRect(lerp(a.x,b.x,i/seg),a.y-3,(b.x-a.x)/seg,6);}}}
  }
  // "#rrggbb" -> "rgba(r,g,b,a)"
  hexA(hex,a){const h=hex.replace('#','');const n=parseInt(h.length===3?h.replace(/(.)/g,'$1$1'):h,16);
    return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
  // 3-layer parallax ridge silhouettes, far->near, scrolling horizontally with
  // worldY at different rates so the backdrop has depth as you advance.
  drawHills(ctx,horizon){const pal=this.pal,layers=POST.parallax,y0=this.player.worldY;
    for(let L=0;L<3;L++){const cfg=layers[L],col=pal.hills[L]||pal.hills[pal.hills.length-1];
      const phase=y0*cfg.rate, base=horizon+L*3; // nearer layers sit a touch lower
      ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(0,base);
      const steps=10;for(let i=0;i<=steps;i++){const x=i/steps*VW;
        const yy=base-cfg.h-cfg.amp*Math.sin(i*1.1+phase+L*2)-cfg.amp*0.5*Math.sin(i*2.7-phase*1.7);
        ctx.lineTo(x,yy);}
      ctx.lineTo(VW,base);ctx.closePath();ctx.fill();}}
  drawProp(ctx,p,pr){const s=pr.scale*p.s*0.04;if(s<0.05)return;ctx.save();ctx.translate(pr.x,pr.y);
    if(p.k==='tuft'){ctx.strokeStyle='rgba(40,90,30,.55)';ctx.lineWidth=Math.max(1,2*s);ctx.lineCap='round';for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*3*s,0);ctx.lineTo(i*3*s+i*s,-10*s);ctx.stroke();}}
    else if(p.k==='flower'){const fc=p.c<.33?'#f6d743':p.c<.66?'#e87fb0':'#fff';ctx.fillStyle=fc;for(let i=0;i<5;i++){const a=i/5*7;ctx.beginPath();ctx.arc(Math.cos(a)*4*s,-6*s+Math.sin(a)*4*s,2.5*s,0,7);ctx.fill();}ctx.fillStyle='#caa83a';ctx.beginPath();ctx.arc(0,-6*s,2*s,0,7);ctx.fill();}
    else{ctx.fillStyle='rgba(110,110,115,.85)';ctx.beginPath();ctx.ellipse(0,-3*s,7*s,5*s,0,0,7);ctx.fill();ctx.fillStyle='rgba(160,160,165,.6)';ctx.beginPath();ctx.ellipse(-2*s,-5*s,3*s,2*s,0,0,7);ctx.fill();}
    ctx.restore();}

  // ----- shaded ball + shadow helpers -----
  ball(ctx,px,py,rx,ry,base,lite){const g=ctx.createRadialGradient(px-rx*0.4,py-ry*0.5,rx*0.1,px,py,Math.max(rx,ry));g.addColorStop(0,lite);g.addColorStop(1,base);ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(px,py,rx,ry,0,0,7);ctx.fill();}
  // Big, high-visibility HP number (+ ratio bar) floating above an entity.
  hpTag(ctx,X,Y,Z,hp,maxHp,big){const p=this.project(X,Y,Z);if(!p)return;
    const fs=clamp((big?0.95:0.5)*p.scale,big?22:14,big?42:26);
    const txt=String(Math.max(0,Math.ceil(hp))),r=clamp(hp/maxHp,0,1),col=r>0.5?'#8dff66':r>0.25?'#ffd23a':'#ff5a4a';
    const bw=Math.max(24,fs*1.7),bh=Math.max(4,fs*0.18),by=p.y+fs*0.58;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(p.x-bw/2,by,bw,bh);
    ctx.fillStyle=col;ctx.fillRect(p.x-bw/2,by,bw*r,bh);
    ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=1;ctx.strokeRect(p.x-bw/2-0.5,by-0.5,bw+1,bh+1);
    ctx.font='900 '+fs+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineJoin='round';
    ctx.lineWidth=Math.max(3,fs*0.22);ctx.strokeStyle='rgba(0,0,0,.92)';ctx.strokeText(txt,p.x,p.y);
    ctx.fillStyle='#fff';ctx.fillText(txt,p.x,p.y);
    ctx.restore();}
  shadow(ctx,X,Z,rw){const p=this.project(X,0,Z);if(!p)return;ctx.save();ctx.globalAlpha=.25;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(p.x,p.y,rw*p.scale,rw*p.scale*0.4,0,0,7);ctx.fill();ctx.restore();}
  part(ctx,X,Y,Z,r,base,lite,ry){const p=this.project(X,Y,Z);if(!p)return null;this.ball(ctx,p.x,p.y,r*p.scale,(ry||r)*p.scale,base,lite);return p;}
  // Sprite drop-in hook: if a prerendered sprite is ever registered for this
  // kind, draw it and return true so the procedural draw is skipped. Empty for
  // now (procedural art) — lets future sprite art slot in without touching the
  // renderer. (Stage 2 scope: hook only, no art.)
  sprites=null;
  drawSprite(kind,o,p){const reg=this.sprites;if(!reg||!reg[kind])return false;/* future: ctx.drawImage(...) */return false;}
  // Cheap rim/edge light: a bright additive crescent on the palette light side,
  // bedding the character into the lit scene. Gated by the FX profile.
  rim(ctx,p,worldR){if(!p)return;const prof=this.fxOn?POST.full:POST.reduced;if(prof.rim<=0)return;
    const R=worldR*p.scale,d=this.pal.lightDir,a=Math.atan2(d.y,d.x);
    ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.5*prof.rim;
    ctx.strokeStyle=this.pal.lightColor+'0.9)';ctx.lineWidth=Math.max(1,R*0.18);ctx.lineCap='round';
    ctx.beginPath();ctx.arc(p.x,p.y,R*0.92,a-0.7,a+0.7);ctx.stroke();ctx.restore();}

  draw_sheep(ctx,s){if(this.drawSprite('sheep',s))return;const X=this.wx3(s.x),Z=this.wz3(s.worldY),bob=Math.sin(s.bob)*0.03;this.shadow(ctx,X,Z,0.26);
    this.part(ctx,X-0.14,0.26+bob,Z,0.15,'#dcd8cc','#ffffff');this.part(ctx,X+0.14,0.26+bob,Z,0.15,'#dcd8cc','#ffffff');
    this.part(ctx,X,0.32+bob,Z,0.24,'#e9e6da','#ffffff');const bp=this.part(ctx,X,0.37+bob,Z-0.04,0.21,'#f3f1e8','#ffffff');this.rim(ctx,bp,0.23);
    this.part(ctx,X,0.27+bob,Z+0.2,0.1,'#3a3a3a','#5a5a5a');}
  draw_player(ctx,p){if(this.drawSprite('player',p))return;const X=this.wx3(p.x),Z=0,bob=Math.sin(p.anim)*0.04,fall=p.dead?Math.min(1,p.deadT*2):0;
    this.shadow(ctx,X,Z,0.4);
    if(p.dead){ctx.save();} const yo=-fall*0.4, tilt=fall*0.5;
    // legs
    this.part(ctx,X-0.13+bob,0.16,Z,0.11,'#5a3c22','#7a5230');this.part(ctx,X+0.13-bob,0.16,Z,0.11,'#5a3c22','#7a5230');
    // staff
    const a=this.project(X+0.34,0.1,Z+0.05),b=this.project(X+0.42,1.5+yo,Z+0.05);if(a&&b){ctx.strokeStyle='#caa15a';ctx.lineWidth=Math.max(2,0.06*a.scale);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
    const hurt=p.hurt>0&&((p.hurt*20|0)%2===0);
    // torso (colour from equipped shepherd skin)
    const sc=(this.shepherd&&this.shepherd.color)||{base:'#2c55b8',lite:'#5b8cf0'};
    const tp=this.part(ctx,X,0.72+yo,Z,0.34,hurt?'#fff':sc.base,hurt?'#fff':sc.lite,0.42);if(!hurt)this.rim(ctx,tp,0.4);
    // head
    this.part(ctx,X,1.18+yo,Z,0.21,hurt?'#fff':'#e8b98c','#ffd9b0');
    // hair
    const hp=this.project(X,1.26+yo,Z);if(hp){ctx.fillStyle='#5a3b22';ctx.beginPath();ctx.ellipse(hp.x,hp.y,0.2*hp.scale,0.13*hp.scale,0,Math.PI,0);ctx.fill();}
    if(p.rs.shield>0){const sp=this.project(X,0.8+yo,Z);if(sp){ctx.strokeStyle='rgba(120,200,255,'+(0.5+0.3*Math.sin(p.anim*2))+')';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(sp.x,sp.y,0.55*sp.scale,0,7);ctx.stroke();}}}
  draw_wolf(ctx,w){if(this.drawSprite('wolf',w))return;const X=this.wx3(w.x),Z=this.wz3(w.worldY),S=w.elite?1.6:1;this.shadow(ctx,X,Z,0.34*S);
    const lite=w.flash>0?'#ffffff':(w.elite?'#c25a48':'#8a8a92'),base=w.flash>0?'#ffffff':(w.elite?'#6e2a22':'#5a5a62');
    this.part(ctx,X-0.28*S,0.5*S,Z-0.28*S,0.1*S,base,lite);
    const wb=this.part(ctx,X,0.42*S,Z,0.26*S,base,lite,0.34*S);if(w.flash<=0)this.rim(ctx,wb,0.28*S);
    const e1=this.project(X-0.16*S,0.78*S,Z+0.18*S),e2=this.project(X+0.16*S,0.78*S,Z+0.18*S),es=4*S;ctx.fillStyle=base;
    if(e1){ctx.beginPath();ctx.moveTo(e1.x-es,e1.y+es);ctx.lineTo(e1.x,e1.y-7*S);ctx.lineTo(e1.x+es,e1.y+es);ctx.fill();}
    if(e2){ctx.beginPath();ctx.moveTo(e2.x-es,e2.y+es);ctx.lineTo(e2.x,e2.y-7*S);ctx.lineTo(e2.x+es,e2.y+es);ctx.fill();}
    this.part(ctx,X,0.5*S,Z+0.22*S,0.18*S,base,lite);this.part(ctx,X,0.4*S,Z+0.42*S,0.1*S,w.elite?'#3a1a16':'#4a4a50',w.elite?'#6a3a32':'#6a6a70');
    const ey=this.project(X,0.56*S,Z+0.34*S);if(ey){ctx.fillStyle=w.elite?'#ffd23a':'#ff3b2f';ctx.beginPath();ctx.arc(ey.x-3*S,ey.y,1.6*S,0,7);ctx.arc(ey.x+3*S,ey.y,1.6*S,0,7);ctx.fill();}
    if(w.elite){const cp=this.project(X,1.02,Z);if(cp){ctx.fillStyle='#ffce3a';ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.font='900 '+Math.max(11,0.34*cp.scale)+'px system-ui';ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=3;ctx.fillText('★',cp.x,cp.y);ctx.shadowBlur=0;}}
    this.hpTag(ctx,X,1.3*S,Z,w.hp,w.maxHp,w.elite);}
  draw_boss(ctx,b){if(this.drawSprite('boss',b))return;const X=this.wx3(b.x),Z=this.wz3(b.worldY),charging=b.state==='windup'||b.state==='charge';this.shadow(ctx,X,Z,0.95);
    const col=b.d.col||{base:'#6a4528',lite:'#9a6a40'};
    const lite=b.flash>0?'#ffd9b0':col.lite,base=b.flash>0?'#ffd9b0':col.base;
    // ears
    this.part(ctx,X-0.6,1.75,Z,0.3,base,lite);this.part(ctx,X+0.6,1.75,Z,0.3,base,lite);
    this.part(ctx,X-0.6,1.78,Z+0.05,0.15,'#4a3018','#6a4528');this.part(ctx,X+0.6,1.78,Z+0.05,0.15,'#4a3018','#6a4528');
    // arms
    const ao=charging?1.15:0.95;this.part(ctx,X-ao,0.55,Z+0.1,0.28,base,lite);this.part(ctx,X+ao,0.55,Z+0.1,0.28,base,lite);
    // body
    const bbp=this.part(ctx,X,0.95,Z,0.92,base,lite,1.0);if(b.flash<=0)this.rim(ctx,bbp,0.92);
    // belly
    this.part(ctx,X,0.7,Z+0.4,0.5,'rgba(240,220,195,.5)','rgba(255,240,220,.6)');
    // muzzle
    this.part(ctx,X,0.85,Z+0.7,0.34,'#c8a072','#e0c098');
    const np=this.project(X,0.95,Z+0.95);if(np){ctx.fillStyle='#201008';ctx.beginPath();ctx.ellipse(np.x,np.y,4,3,0,0,7);ctx.fill();}
    const ep=this.project(X,1.45,Z+0.5);if(ep){ctx.fillStyle='#201008';ctx.beginPath();ctx.arc(ep.x-12,ep.y,4,0,7);ctx.arc(ep.x+12,ep.y,4,0,7);ctx.fill();
      if(charging){ctx.strokeStyle='#3a1808';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ep.x-20,ep.y-8);ctx.lineTo(ep.x-6,ep.y-2);ctx.moveTo(ep.x+20,ep.y-8);ctx.lineTo(ep.x+6,ep.y-2);ctx.stroke();}}
    // big HP number above the bear
    this.hpTag(ctx,X,2.12,Z,b.hp,b.maxHp,true);}
  draw_shot(ctx,s){if(this.drawSprite('shot',s))return;const p=this.project(this.wx3(s.x),0.7,this.wz3(s.worldY));if(!p)return;const r=Math.max(2,0.09*p.scale);ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(p.x,p.y,r,0,7);ctx.fill();ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(p.x-r*0.3,p.y-r*0.3,r*0.4,0,7);ctx.fill();}
  draw_stone(ctx,s){if(this.drawSprite('stone',s))return;const X=this.wx3(s.x),Z=this.wz3(s.worldY),bob=Math.sin(s.bob)*0.04;this.shadow(ctx,X,Z,0.2);
    // soft glow ring so collectible piles read differently from scenery rocks
    const gp=this.project(X,0.1,Z);if(gp){ctx.save();ctx.globalAlpha=.45+.3*Math.sin(s.bob*1.4);const rg=ctx.createRadialGradient(gp.x,gp.y,1,gp.x,gp.y,Math.max(6,0.42*gp.scale));rg.addColorStop(0,'rgba(255,224,120,.7)');rg.addColorStop(1,'rgba(255,224,120,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(gp.x,gp.y,Math.max(6,0.42*gp.scale),0,7);ctx.fill();ctx.restore();}
    this.part(ctx,X-0.12,0.12+bob,Z,0.1,'#8a8580','#cfcabf');
    this.part(ctx,X+0.12,0.11+bob,Z+0.05,0.09,'#7d7a74','#c2bdb2');
    this.part(ctx,X,0.18+bob,Z-0.03,0.12,'#9a958d','#e3ddcf');
    const sp=this.project(X,0.36+bob,Z);if(sp){ctx.fillStyle='#fff6c8';ctx.font='900 '+Math.max(9,0.3*sp.scale)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=3;ctx.fillText('✦',sp.x,sp.y);ctx.shadowBlur=0;}}
  draw_gate(ctx,g){const Z=this.wz3(g.worldY);if(Z<0.05)return;this.gatePanel(ctx,-TRACK_HALF,0,Z,g.l);this.gatePanel(ctx,0,TRACK_HALF,Z,g.r);}
  gatePanel(ctx,x0,x1,Z,gate){const TOP=1.18;const a=this.project(x0,0,Z),b=this.project(x1,0,Z),c=this.project(x1,TOP,Z),d=this.project(x0,TOP,Z);if(!a||!b||!c||!d)return;
    const pos=gate.tone==='pos';ctx.save();
    const grad=ctx.createLinearGradient(0,c.y,0,a.y);
    if(pos){grad.addColorStop(0,'rgba(70,150,230,.18)');grad.addColorStop(1,'rgba(70,150,230,.42)');}else{grad.addColorStop(0,'rgba(220,70,70,.2)');grad.addColorStop(1,'rgba(220,70,70,.44)');}
    ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(c.x,c.y);ctx.lineTo(d.x,d.y);ctx.closePath();ctx.fill();
    ctx.strokeStyle=pos?'rgba(150,210,255,.95)':'rgba(255,150,150,.95)';ctx.lineWidth=3;ctx.stroke();
    // top banner bar
    ctx.fillStyle=pos?'rgba(120,190,255,.9)':'rgba(255,130,130,.9)';ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(c.x,c.y);ctx.lineTo(c.x,c.y-6);ctx.lineTo(d.x,d.y-6);ctx.closePath();ctx.fill();
    // label, auto-fitted to the panel width so long labels never overflow into the neighbour
    const pw=Math.abs(b.x-a.x);
    if(pw>40){const mx=(c.x+d.x)/2,my=(c.y+d.y)/2;ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.85)';ctx.shadowBlur=5;
      let fs=clamp(0.62*a.scale,11,30);ctx.font='900 '+fs+'px system-ui';const tw=ctx.measureText(gate.label).width,maxw=pw*0.9;
      if(tw>maxw){fs=Math.max(9,fs*maxw/tw);ctx.font='900 '+fs+'px system-ui';}
      ctx.fillText(gate.label,mx,my+4);}
    ctx.restore();}

  drawTelegraph(ctx){const b=this.boss;const a=this.project(this.wx3(b.x),0,this.wz3(b.worldY)),t=this.project(this.wx3(b.tx),0,0);if(!a||!t)return;
    const al=.25+.35*Math.abs(Math.sin(b.windup*18));ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#ff3b2f';
    ctx.beginPath();ctx.moveTo(a.x-18,a.y);ctx.lineTo(a.x+18,a.y);ctx.lineTo(t.x+30,t.y);ctx.lineTo(t.x-30,t.y);ctx.closePath();ctx.fill();ctx.restore();}

  drawFloaters(ctx){ctx.save();ctx.textAlign='center';ctx.font='bold 16px system-ui';for(const f of this.floaters){f.life-=1/60;f.y-=0.6;const al=clamp(f.life/f.max,0,1);ctx.globalAlpha=al;ctx.fillStyle=f.col;ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=3;ctx.fillText(f.txt,f.x,f.y);}ctx.restore();this.floaters=this.floaters.filter(f=>f.life>0);}
}

// ----------------------------- INPUT ---------------------------------
class Input{constructor(g){this.pointer=false;this.px=VW/2;this.dir=0;this._l=false;this._r=false;const c=g.canvas;
  const down=(x,y)=>{if(g.paused||g.rs.status==='ready'||g.rs.status==='win'||g.rs.status==='fail')return;this.pointer=true;this.px=g.toV(x,y).x;};
  const move=(x,y)=>{if(this.pointer)this.px=g.toV(x,y).x;};const up=()=>{this.pointer=false;};
  c.addEventListener('mousedown',e=>down(e.clientX,e.clientY));window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));window.addEventListener('mouseup',up);
  c.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];down(t.clientX,t.clientY);},{passive:false});
  c.addEventListener('touchmove',e=>{e.preventDefault();const t=e.changedTouches[0];move(t.clientX,t.clientY);},{passive:false});
  c.addEventListener('touchend',e=>{e.preventDefault();up();},{passive:false});
  window.addEventListener('keydown',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')this._l=true;if(e.code==='ArrowRight'||e.code==='KeyD')this._r=true;
    if((e.code==='Enter'||e.code==='Space')&&(g.rs.status==='ready'||g.rs.status==='win'||g.rs.status==='fail'))g.start();
    if(e.code==='KeyP'||e.code==='Escape')g.togglePause();
    if(e.code==='KeyM'){g.audio.muted=!g.audio.muted;g.dom.mute.textContent=g.audio.muted?'🔇':'🔊';}this.dir=(this._r?1:0)-(this._l?1:0);});
  window.addEventListener('keyup',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')this._l=false;if(e.code==='ArrowRight'||e.code==='KeyD')this._r=false;this.dir=(this._r?1:0)-(this._l?1:0);});}}

// ------------------------------ BOOT ---------------------------------
const game=new Game();window.__game=game;
let last=0;function frame(t){if(!last)last=t;let dt=(t-last)/1000;last=t;if(dt>0.05)dt=0.05;game.update(dt);game.render();requestAnimationFrame(frame);}
requestAnimationFrame(frame);
</script>
